# Build the Vite app from ./frontend (paths below are relative to [build].base).
#
# For long requests (e.g. LaTeX→PDF), set Netlify env VITE_API_BASE_URL to your Render
# origin (https://….onrender.com) so the browser calls Render directly. Netlify’s proxy
# to external URLs times out at ~26s and returns 504.
#
# Set VITE_SITE_URL to your site origin (https://….netlify.app or custom domain), no trailing
# slash — used for canonical URL, Open Graph, robots.txt, and sitemap.xml at build time.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API requests to the Render backend (optional if VITE_API_BASE_URL is set at build)
[[redirects]]
  from = "/api/*"
  to = "https://job-agent-mtwe.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/docs"
  to = "https://job-agent-mtwe.onrender.com/docs"
  status = 200
  force = true

[[redirects]]
  from = "/openapi.json"
  to = "https://job-agent-mtwe.onrender.com/openapi.json"
  status = 200
  force = true

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
